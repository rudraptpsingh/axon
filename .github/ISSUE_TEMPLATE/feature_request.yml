name: Feature request
description: Suggest a capability or integration
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What agent workflow or local runtime issue should Axon help with?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Axon do?
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: User value
      description: How would this improve cost, speed, reliability, or developer experience?
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy boundary
      options:
        - label: This can work without telemetry or cloud calls.
          required: true
