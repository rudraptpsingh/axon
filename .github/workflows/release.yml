name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/axon dist/axon-${{ matrix.target }}
          cd dist && shasum -a 256 axon-${{ matrix.target }} > axon-${{ matrix.target }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: axon-${{ matrix.target }}
          path: dist/

  build-linux:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/axon dist/axon-${{ matrix.target }}
          cd dist && sha256sum axon-${{ matrix.target }} > axon-${{ matrix.target }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: axon-${{ matrix.target }}
          path: dist/

  universal:
    name: Universal Binary
    needs: build-macos
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: axon-aarch64-apple-darwin
          path: arm64/
      - uses: actions/download-artifact@v4
        with:
          name: axon-x86_64-apple-darwin
          path: x86_64/

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            arm64/axon-aarch64-apple-darwin \
            x86_64/axon-x86_64-apple-darwin \
            -output dist/axon-universal-apple-darwin
          cd dist && shasum -a 256 axon-universal-apple-darwin > axon-universal-apple-darwin.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: axon-universal-apple-darwin
          path: dist/

  release:
    name: Create Release
    needs: [build-macos, build-linux, universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/axon-aarch64-apple-darwin/axon-aarch64-apple-darwin
            artifacts/axon-aarch64-apple-darwin/axon-aarch64-apple-darwin.sha256
            artifacts/axon-x86_64-apple-darwin/axon-x86_64-apple-darwin
            artifacts/axon-x86_64-apple-darwin/axon-x86_64-apple-darwin.sha256
            artifacts/axon-universal-apple-darwin/axon-universal-apple-darwin
            artifacts/axon-universal-apple-darwin/axon-universal-apple-darwin.sha256
            artifacts/axon-x86_64-unknown-linux-gnu/axon-x86_64-unknown-linux-gnu
            artifacts/axon-x86_64-unknown-linux-gnu/axon-x86_64-unknown-linux-gnu.sha256
            artifacts/axon-aarch64-unknown-linux-gnu/axon-aarch64-unknown-linux-gnu
            artifacts/axon-aarch64-unknown-linux-gnu/axon-aarch64-unknown-linux-gnu.sha256

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract version and SHAs
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_AARCH64_DARWIN=$(awk '{print $1}' artifacts/axon-aarch64-apple-darwin/axon-aarch64-apple-darwin.sha256)
          SHA_X86_64_DARWIN=$(awk '{print $1}' artifacts/axon-x86_64-apple-darwin/axon-x86_64-apple-darwin.sha256)
          SHA_AARCH64_LINUX=$(awk '{print $1}' artifacts/axon-aarch64-unknown-linux-gnu/axon-aarch64-unknown-linux-gnu.sha256)
          SHA_X86_64_LINUX=$(awk '{print $1}' artifacts/axon-x86_64-unknown-linux-gnu/axon-x86_64-unknown-linux-gnu.sha256)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha_aarch64_darwin=$SHA_AARCH64_DARWIN" >> "$GITHUB_OUTPUT"
          echo "sha_x86_64_darwin=$SHA_X86_64_DARWIN" >> "$GITHUB_OUTPUT"
          echo "sha_aarch64_linux=$SHA_AARCH64_LINUX" >> "$GITHUB_OUTPUT"
          echo "sha_x86_64_linux=$SHA_X86_64_LINUX" >> "$GITHUB_OUTPUT"

      - name: Clone homebrew tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/rudraptpsingh/homebrew-axon.git tap

      - name: Update formula
        run: |
          cd tap
          cat > Formula/axon.rb << 'FORMULA'
          class Axon < Formula
            desc "Local hardware intelligence for AI coding agents"
            homepage "https://github.com/rudraptpsingh/axon"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/rudraptpsingh/axon/releases/download/v#{version}/axon-aarch64-apple-darwin"
                sha256 "SHA_AARCH64_DARWIN_PLACEHOLDER"
              else
                url "https://github.com/rudraptpsingh/axon/releases/download/v#{version}/axon-x86_64-apple-darwin"
                sha256 "SHA_X86_64_DARWIN_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/rudraptpsingh/axon/releases/download/v#{version}/axon-aarch64-unknown-linux-gnu"
                sha256 "SHA_AARCH64_LINUX_PLACEHOLDER"
              else
                url "https://github.com/rudraptpsingh/axon/releases/download/v#{version}/axon-x86_64-unknown-linux-gnu"
                sha256 "SHA_X86_64_LINUX_PLACEHOLDER"
              end
            end

            def install
              binary = Dir["axon-*"].first
              mv binary, "axon"
              chmod 0755, "axon"
              bin.install "axon"
            end

            def post_install
              ohai "axon installed. Restart your AI agent (Claude Desktop, Cursor, VS Code) to activate."
              ohai "Run 'axon diagnose' to verify."
            end

            test do
              assert_match "axon", shell_output("#{bin}/axon --help")
            end
          end
          FORMULA
          sed -i "s/VERSION_PLACEHOLDER/${{ steps.meta.outputs.version }}/" Formula/axon.rb
          sed -i "s/SHA_AARCH64_DARWIN_PLACEHOLDER/${{ steps.meta.outputs.sha_aarch64_darwin }}/" Formula/axon.rb
          sed -i "s/SHA_X86_64_DARWIN_PLACEHOLDER/${{ steps.meta.outputs.sha_x86_64_darwin }}/" Formula/axon.rb
          sed -i "s/SHA_AARCH64_LINUX_PLACEHOLDER/${{ steps.meta.outputs.sha_aarch64_linux }}/" Formula/axon.rb
          sed -i "s/SHA_X86_64_LINUX_PLACEHOLDER/${{ steps.meta.outputs.sha_x86_64_linux }}/" Formula/axon.rb
          cat Formula/axon.rb

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/axon.rb
          git diff --cached --quiet && echo "[info] No changes" && exit 0
          git commit -m "Bump to v${{ steps.meta.outputs.version }}"
          git push
