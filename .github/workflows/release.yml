name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI Gate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
      - run: cargo test --workspace -- --ignored --skip live_serve --skip agent_ --skip perf_scenario --skip live_gpu_snapshot

  build-macos:
    name: Build (${{ matrix.target }})
    needs: ci
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/axon dist/axon-${{ matrix.target }}
          cd dist && shasum -a 256 axon-${{ matrix.target }} > axon-${{ matrix.target }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: axon-${{ matrix.target }}
          path: dist/

  build-linux:
    name: Build (${{ matrix.target }})
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/axon dist/axon-${{ matrix.target }}
          cd dist && sha256sum axon-${{ matrix.target }} > axon-${{ matrix.target }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: axon-${{ matrix.target }}
          path: dist/

  universal:
    name: Universal Binary
    needs: build-macos
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: axon-aarch64-apple-darwin
          path: arm64/
      - uses: actions/download-artifact@v4
        with:
          name: axon-x86_64-apple-darwin
          path: x86_64/

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            arm64/axon-aarch64-apple-darwin \
            x86_64/axon-x86_64-apple-darwin \
            -output dist/axon-universal-apple-darwin
          cd dist && shasum -a 256 axon-universal-apple-darwin > axon-universal-apple-darwin.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: axon-universal-apple-darwin
          path: dist/

  release:
    name: Create Release
    needs: [build-macos, build-linux, universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/axon-aarch64-apple-darwin/axon-aarch64-apple-darwin
            artifacts/axon-aarch64-apple-darwin/axon-aarch64-apple-darwin.sha256
            artifacts/axon-x86_64-apple-darwin/axon-x86_64-apple-darwin
            artifacts/axon-x86_64-apple-darwin/axon-x86_64-apple-darwin.sha256
            artifacts/axon-universal-apple-darwin/axon-universal-apple-darwin
            artifacts/axon-universal-apple-darwin/axon-universal-apple-darwin.sha256
            artifacts/axon-x86_64-unknown-linux-gnu/axon-x86_64-unknown-linux-gnu
            artifacts/axon-x86_64-unknown-linux-gnu/axon-x86_64-unknown-linux-gnu.sha256
            artifacts/axon-aarch64-unknown-linux-gnu/axon-aarch64-unknown-linux-gnu
            artifacts/axon-aarch64-unknown-linux-gnu/axon-aarch64-unknown-linux-gnu.sha256

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract version and SHAs
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_AARCH64_DARWIN=$(awk '{print $1}' artifacts/axon-aarch64-apple-darwin/axon-aarch64-apple-darwin.sha256)
          SHA_X86_64_DARWIN=$(awk '{print $1}' artifacts/axon-x86_64-apple-darwin/axon-x86_64-apple-darwin.sha256)
          SHA_AARCH64_LINUX=$(awk '{print $1}' artifacts/axon-aarch64-unknown-linux-gnu/axon-aarch64-unknown-linux-gnu.sha256)
          SHA_X86_64_LINUX=$(awk '{print $1}' artifacts/axon-x86_64-unknown-linux-gnu/axon-x86_64-unknown-linux-gnu.sha256)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha_aarch64_darwin=$SHA_AARCH64_DARWIN" >> "$GITHUB_OUTPUT"
          echo "sha_x86_64_darwin=$SHA_X86_64_DARWIN" >> "$GITHUB_OUTPUT"
          echo "sha_aarch64_linux=$SHA_AARCH64_LINUX" >> "$GITHUB_OUTPUT"
          echo "sha_x86_64_linux=$SHA_X86_64_LINUX" >> "$GITHUB_OUTPUT"

      - name: Trigger homebrew tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh api repos/rudraptpsingh/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[version]=${{ steps.meta.outputs.version }}" \
            -f "client_payload[sha_aarch64_darwin]=${{ steps.meta.outputs.sha_aarch64_darwin }}" \
            -f "client_payload[sha_x86_64_darwin]=${{ steps.meta.outputs.sha_x86_64_darwin }}" \
            -f "client_payload[sha_aarch64_linux]=${{ steps.meta.outputs.sha_aarch64_linux }}" \
            -f "client_payload[sha_x86_64_linux]=${{ steps.meta.outputs.sha_x86_64_linux }}"
