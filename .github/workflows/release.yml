name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/axon dist/axon-${{ matrix.target }}
          cd dist && shasum -a 256 axon-${{ matrix.target }} > axon-${{ matrix.target }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: axon-${{ matrix.target }}
          path: dist/

  universal:
    name: Universal Binary
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: axon-aarch64-apple-darwin
          path: arm64/
      - uses: actions/download-artifact@v4
        with:
          name: axon-x86_64-apple-darwin
          path: x86_64/

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            arm64/axon-aarch64-apple-darwin \
            x86_64/axon-x86_64-apple-darwin \
            -output dist/axon-universal-apple-darwin
          cd dist && shasum -a 256 axon-universal-apple-darwin > axon-universal-apple-darwin.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: axon-universal-apple-darwin
          path: dist/

  release:
    name: Create Release
    needs: [build, universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/axon-aarch64-apple-darwin/axon-aarch64-apple-darwin
            artifacts/axon-aarch64-apple-darwin/axon-aarch64-apple-darwin.sha256
            artifacts/axon-x86_64-apple-darwin/axon-x86_64-apple-darwin
            artifacts/axon-x86_64-apple-darwin/axon-x86_64-apple-darwin.sha256
            artifacts/axon-universal-apple-darwin/axon-universal-apple-darwin
            artifacts/axon-universal-apple-darwin/axon-universal-apple-darwin.sha256

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: axon-aarch64-apple-darwin
          path: arm64/

      - name: Extract version and SHA
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(cat arm64/axon-aarch64-apple-darwin.sha256 | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "[info] version=$VERSION sha256=$SHA256"

      - name: Clone homebrew tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/rudraptpsingh/homebrew-axon.git tap

      - name: Update formula
        run: |
          cd tap
          sed -i 's/version ".*"/version "${{ steps.meta.outputs.version }}"/' Formula/axon.rb
          sed -i 's/sha256 ".*"/sha256 "${{ steps.meta.outputs.sha256 }}"/' Formula/axon.rb
          cat Formula/axon.rb

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/axon.rb
          git diff --cached --quiet && echo "[info] No changes" && exit 0
          git commit -m "Bump to v${{ steps.meta.outputs.version }}"
          git push
